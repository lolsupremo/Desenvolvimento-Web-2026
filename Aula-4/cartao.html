<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: content-box;
        }
        .cartao {
            background-color: lightgray;
            width: 400px;
            height: 300px;
            border-radius: 10%;
            padding: 20px;
        }
        .tipo{

            margin: 20px 20px 20px 20px;

        }
        .chip{

            background-color: rgb(241, 241, 241);
            width: 60px;
            height: 45px;
            border-radius: 10%;
            margin: 40px 0 0 40px;
        }
        .dados{

            margin: 100px 0 0 20px ;
            float: left;
        }

        .mastercard{
            float: left;
            display: flex;
            margin: 100px 0 0 90px
            

        }
        .vermelho{

            background-color: red;
            width: 60px;
            height: 60px;
            border-radius: 50%;

        }
        .amarelo{

            background-color: yellow;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="cartao">
        <div class="tipo">
            <h1>business</h1>
        </div>
        <div class="chip"></div>
        <div class="dados">
            <h3>2345 6543 4578 0978</h3>
            <h3>12/45</h3>
            <h3>Fulano Detal</h3>
        </div>
        <div class="mastercard">
            <div class="vermelho"></div>
            <div class="amarelo"></div>
        </div>
    </div>
</body>
</html>
